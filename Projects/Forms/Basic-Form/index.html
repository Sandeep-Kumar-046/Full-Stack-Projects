<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../Basic-Form/styles/variables.css">
  <link rel="stylesheet" href="../Basic-Form/styles/style.css">
  <title>Basic Form</title>
</head>
<body>
  <div class="form-container">
    <form action="" id="basic-form" class="form">
      <h1>Basic form details</h1>
      <div class="feilds">
        <label for="name">Username</label>
        <input type="text" id="name" name="name">
        <label for="email">Email</label>
        <input type="email" name="email" id="email">
        <label for="phone">Phone</label>
        <input type="tel" name="phone" id="phone" pattern="(\+91)?[6-9]\d{9}">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
